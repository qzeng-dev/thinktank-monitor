name: Think Tank Daily Monitor

on:
  schedule:
    # Daily at 1:00 UTC = 9:00 AM Beijing time
    - cron: "0 1 * * *"
  workflow_dispatch:  # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Think Tank Monitor
        env:
          QQ_SMTP_SENDER: ${{ secrets.QQ_SMTP_SENDER }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
        run: python3 thinktank_monitor.py
